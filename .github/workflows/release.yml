name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write
  attestations: write
jobs:
  build:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - zig_target: x86_64-macos-none
            asset: gh-task-darwin-amd64
          - zig_target: aarch64-macos-none
            asset: gh-task-darwin-arm64
          - zig_target: x86_64-linux-musl
            asset: gh-task-linux-amd64
          - zig_target: aarch64-linux-musl
            asset: gh-task-linux-arm64
          - zig_target: x86_64-windows-gnu
            asset: gh-task-windows-amd64.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        timeout-minutes: 5
        with:
          version: 0.15.2
      - name: Build
        timeout-minutes: 5
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.zig_target }}
      - name: Rename binary
        timeout-minutes: 5
        run: |
          src="zig-out/bin/gh-task"
          if [[ "${{ matrix.asset }}" == *.exe ]]; then
            src="${src}.exe"
          fi
          mv "$src" "${{ matrix.asset }}"
      - name: Generate attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        timeout-minutes: 5
        with:
          subject-path: ${{ matrix.asset }}
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        timeout-minutes: 5
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
  release:
    needs: build
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        timeout-minutes: 5
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        timeout-minutes: 5
        run: sha256sum gh-task-* > checksums.txt
      - name: Attest checksums
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        timeout-minutes: 5
        with:
          subject-path: artifacts/checksums.txt
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        timeout-minutes: 5
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes \
            artifacts/*
